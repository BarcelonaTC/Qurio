[versions]
agp = "8.11.2"
carbon = "0.17.0"
coreSplashscreen = "1.0.0"
daggerAndroid = "2.57.2"
datastorePreferencesCore = "1.1.7"
kotlin = "2.2.20"
coreKtx = "1.17.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
kotlinxCoroutinesCore = "2.2.20"
kotlinxCoroutinesCoreVersion = "1.10.2"
kotlinxSerializationJson = "1.9.0"
lottie = "6.4.0"
material = "1.13.0"
activity = "1.11.0"
constraintlayout = "2.2.1"
navigationFragmentKtx = "2.8.0"
